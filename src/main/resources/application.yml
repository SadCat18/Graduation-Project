server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: javademo1
  config:
    import: optional:classpath:application-local.yml
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/skate_exchange?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:appuser}
    password: ${DB_PASSWORD:App@123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: ${REDIS_TIMEOUT:3000ms}
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
    show-sql: false

jwt:
  secret: ${JWT_SECRET:4d6d7d6f3f6f2f7a7f5d3e6a0c8b7e9a4d6d7d6f3f6f2f7a7f5d3e6a0c8b7e9a}
  expiration-hours: ${JWT_EXPIRATION_HOURS:24}

ai:
  provider: ${AI_PROVIDER:ark}
  model: ${AI_MODEL:doubao-seed-2-0-lite-260428}
  base-url: ${AI_BASE_URL:https://ark.cn-beijing.volces.com/api/v3/chat/completions}
  api-key: ${AI_API_KEY:${ARK_API_KEY:}}
